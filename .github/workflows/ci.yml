name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: JP_EDUCATION/Claude_code_Building_Faster/Radio_Calico

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Python dependencies
        run: pip install -r requirements.txt pytest

      - name: Install JS dependencies
        run: npm ci

      - name: Run tests
        run: make test

  security:
    name: Security Scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install bandit
        run: pip install bandit

      - name: Install JS dependencies
        run: npm ci

      - name: Run security scans
        run: make test-security
