server {
    listen 80;

    # Gzip compression for all text responses
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/css application/javascript application/json text/html text/plain;

    # Static files served directly by nginx — bypasses Gunicorn entirely.
    # Long-lived cache: browsers revalidate only on next deploy (immutable).
    location /static/ {
        alias   /app/static/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location / {
        proxy_pass         http://web:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
