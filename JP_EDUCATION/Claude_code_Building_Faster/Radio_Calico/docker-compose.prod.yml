services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       radio_calico
      POSTGRES_USER:     radio_calico
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radio_calico"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  web:
    build:
      context: .
      target: prod
    environment:
      SECRET_KEY:   ${SECRET_KEY}
      DATABASE_URL: postgresql://radio_calico:${POSTGRES_PASSWORD}@db/radio_calico
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  db_data:
