services:
  web:
    build:
      context: .
      target: dev
    ports:
      - "5050:5050"
    volumes:
      - .:/app           # live reload — source changes reflect immediately
      - db_data:/app/instance
    environment:
      SECRET_KEY: dev-secret-not-for-prod
    restart: unless-stopped

volumes:
  db_data:
