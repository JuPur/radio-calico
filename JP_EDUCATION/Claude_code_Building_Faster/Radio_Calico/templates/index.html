<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Kryten</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Open+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <header class="site-header">
        <img src="{{ url_for('static', filename='img/kryten.jpg') }}" alt="Radio Kryten" class="site-logo">
        <h1 class="site-title">Radio Kryten</h1>
        <p class="site-subtitle">Live Lossless Audio Stream</p>
        <div class="genre-tags">
            <span class="genre-tag">Indie</span>
            <span class="genre-tag">Alternative</span>
            <span class="genre-tag">Art Pop</span>
        </div>
    </header>

    <main class="main-content">

        <!-- Controls Card -->
        <div class="player-card">
            <div class="controls-row">
                <button class="play-btn" id="playBtn" aria-label="Play">
                    <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
                        <polygon points="5,3 19,12 5,21"/>
                    </svg>
                    <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
                        <rect x="5" y="3" width="4" height="18"/>
                        <rect x="15" y="3" width="4" height="18"/>
                    </svg>
                    <span class="btn-label">Listen Now</span>
                </button>

                <div class="volume-group">
                    <span class="volume-label">Volume:</span>
                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="1" aria-label="Volume">
                    <span class="volume-pct" id="volumePct">100%</span>
                </div>

                <span class="time-counter" id="timeElapsed">0:00</span>
            </div>

            <div class="quality-row">
                <span class="quality-item">Source: <strong id="sourceQuality">—</strong></span>
                <span class="quality-divider">·</span>
                <span class="quality-item">Stream: <strong id="streamQuality">—</strong></span>
            </div>

            <div class="error-msg" id="errorMsg"></div>
            <span id="statusText"></span>
        </div>

        <!-- Now Playing Card -->
        <div class="now-playing-card">
            <h2 class="section-heading">🎵 Now Playing</h2>

            <div class="now-playing-body">
                <div class="player-artwork">
                    <div class="artwork-placeholder" id="artworkPlaceholder">
                        <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <circle cx="60" cy="60" r="60" fill="#E5D9C5"/>
                            <circle cx="60" cy="60" r="28" fill="#C45018" opacity="0.3"/>
                            <circle cx="60" cy="60" r="10" fill="#C45018"/>
                            <path d="M60 10 A50 50 0 0 1 110 60" stroke="#2B211E" stroke-width="4" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <img id="artworkImg" class="artwork-img" src="" alt="Album art">
                    <div class="live-badge">LIVE</div>
                </div>

                <div class="track-meta">
                    <h3 class="track-title" id="trackTitle">Live Stream</h3>
                    <p class="track-artist" id="trackArtist">Radio Calico</p>
                    <p class="track-album" id="trackAlbum">Lossless 24-bit / 48 kHz</p>
                </div>
            </div>

            <div class="progress-row" id="progressRow">
                <div class="progress-bar-track">
                    <div class="progress-bar-fill" id="progressFill"></div>
                </div>
                <span class="time-label" id="timeRemaining">—</span>
            </div>

            <div class="rating-row" id="ratingRow">
                <div id="ratingPrompt">
                    <button class="rating-prompt-btn" id="ratingPromptBtn">Rate this track</button>
                </div>
                <div id="ratingButtons">
                    <button class="rating-btn" id="thumbsUpBtn" aria-label="Thumbs up">
                        👍 <span id="thumbsUpCount">0</span>
                    </button>
                    <button class="rating-btn" id="thumbsDownBtn" aria-label="Thumbs down">
                        👎 <span id="thumbsDownCount">0</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Recently Played -->
        <section class="history-section" id="historySection">
            <h2 class="section-heading">🎬 Recently Played</h2>
            <ul class="history-list" id="historyList"></ul>
        </section>

    </main>

    <footer class="site-footer">
        <p>Ad-free &nbsp;·&nbsp; Data-free &nbsp;·&nbsp; Subscription-free</p>
    </footer>

    <audio id="radioAudio" preload="none"></audio>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
